name: AgriGuard Android CI

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master" ]

env:
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx2g -XX:MaxMetaspaceSize=512m -Dfile.encoding=UTF-8"

jobs:
  build:
    name: Build - Lint - Test - APK
    runs-on: ubuntu-latest

    steps:

      # 1. Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. JDK 17 (required by AGP 8.7.3 + Gradle 9.4.1)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 3. Make gradlew executable on Linux
      - name: Grant gradlew execute permission
        run: chmod +x gradlew

      # 4. Inject PLANT_ID_API_KEY secret into local.properties
      #    Configure: Settings -> Secrets -> Actions -> PLANT_ID_API_KEY
      - name: Inject PLANT_ID_API_KEY
        run: |
          echo "PLANT_ID_API_KEY=${{ secrets.PLANT_ID_API_KEY }}" >> local.properties

      # 5. Inject google-services.json
      #    Configure: Settings -> Secrets -> Actions -> GOOGLE_SERVICES_JSON
      #    Value: paste the full content of app/google-services.json
      - name: Inject google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" > app/google-services.json
            echo "google-services.json injected from secret."
          else
            echo "WARNING: GOOGLE_SERVICES_JSON secret not set."
            echo "Using fallback: creating minimal google-services.json for CI build."
            cat > app/google-services.json << 'EOFGS'
          {
            "project_info": {
              "project_number": "971116950369",
              "firebase_url": "https://agriguard-29853-default-rtdb.asia-southeast1.firebasedatabase.app",
              "project_id": "agriguard-29853",
              "storage_bucket": "agriguard-29853.firebasestorage.app"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:971116950369:android:6b663c100b0b2bd1b28b20",
                  "android_client_info": {
                    "package_name": "com.example.agriguard"
                  }
                },
                "oauth_client": [
                  {
                    "client_id": "971116950369-dummy.apps.googleusercontent.com",
                    "client_type": 3
                  }
                ],
                "api_key": [
                  {
                    "current_key": "AIzaSyAxFdzc9D4Gof05ZXAN8T-mDbvY1vpcVts"
                  }
                ],
                "services": {
                  "appinvite_service": {
                    "other_platform_oauth_client": []
                  }
                }
              }
            ],
            "configuration_version": "1"
          }
          EOFGS
          fi
          echo "google-services.json size: $(wc -c < app/google-services.json) bytes"

      # 6. Cache Gradle packages
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 7. Run unit tests
      - name: Run unit tests
        run: ./gradlew test --stacktrace

      # 8. Upload unit test results
      - name: Upload unit test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results-${{ github.run_number }}
          path: app/build/reports/tests/testDebugUnitTest/
          retention-days: 14

      # 9. Android Lint (abortOnError=false in build.gradle.kts - non-blocking)
      - name: Run Android Lint
        run: ./gradlew lintDebug --stacktrace

      # 10. Upload lint report
      - name: Upload lint report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lint-report-${{ github.run_number }}
          path: app/build/reports/lint-results-debug.html
          retention-days: 14

      # 11. Build debug APK
      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      # 12. Upload debug APK artifact
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: agriguard-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
