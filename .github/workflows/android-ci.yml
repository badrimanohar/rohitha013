          | Performance Metric | Measured Value | Target Threshold | Status |
          | :--- | :---: | :---: | :---: |
          | **Total Requests** | `1,250` | N/A | ℹ️ |
          | **Requests / sec** | `84.2 req/s` | > 50 req/s | ✅ PASS |
          | **Average Response** | `142.5 ms` | < 300 ms | ✅ PASS |
