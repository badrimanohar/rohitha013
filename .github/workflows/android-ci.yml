name: AgriGuard Android CI

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build · Lint · Test · APK
    runs-on: ubuntu-latest

    steps:

      # 1. Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. JDK 17 (required by AGP 8.7.3 + Gradle 9.4.1)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 3. Make gradlew executable on Linux
      - name: Grant gradlew execute permission
        run: chmod +x gradlew

      # 4. Inject PLANT_ID_API_KEY
      #    Add secret in: Settings -> Secrets -> Actions -> PLANT_ID_API_KEY
      - name: Create local.properties with API key
        run: |
          echo "PLANT_ID_API_KEY=${{ secrets.PLANT_ID_API_KEY }}" >> local.properties

      # 5. Inject google-services.json from secret
      #    Add secret in: Settings -> Secrets -> Actions -> GOOGLE_SERVICES_JSON
      - name: Create google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > app/google-services.json

      # 6. Gradle cache
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 7. Unit tests
      - name: Run unit tests
        run: ./gradlew test --stacktrace

      # 8. Upload unit test results
      - name: Upload unit test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results-${{ github.run_number }}
          path: app/build/reports/tests/testDebugUnitTest/
          retention-days: 14

      # 9. Android Lint
      - name: Run Android Lint
        run: ./gradlew lintDebug --stacktrace

      # 10. Upload lint report
      - name: Upload lint report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lint-report-${{ github.run_number }}
          path: app/build/reports/lint-results-debug.html
          retention-days: 14

      # 11. Build debug APK
      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      # 12. Upload APK artifact
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: agriguard-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
